<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#080e22"/>
  <!-- Subtle gradient overlay -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#080e22" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- P — white, bold, Inter-style -->
  <text
    x="8"
    y="48"
    font-family="Inter, Arial Black, Arial, sans-serif"
    font-size="46"
    font-weight="900"
    fill="white"
    letter-spacing="-2"
  >P</text>
  <!-- + — blue-400 #60a5fa, smaller, bottom-right -->
  <text
    x="38"
    y="56"
    font-family="Inter, Arial Black, Arial, sans-serif"
    font-size="28"
    font-weight="900"
    fill="#60a5fa"
    letter-spacing="-1"
  >+</text>
</svg>
